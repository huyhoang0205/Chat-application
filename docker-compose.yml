name: chatapp

services:
  mysql:
    container_name: mysql
    image: mysql:8.3.0
    ports:
      - 3306:3306
    volumes:
      - mysql-data:/var/lib/mysql
    environment: 
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: chat_app
  redis-server:
    image: redis:8.0
    container_name: redis-server-chatapp
    hostname: redis-server
    ports:
      - "6379:6379"
  backend:
    image: huyhoang25/chatapp_backend:v3
    container_name: spring_app
    restart: always
    environment:
      - MYSQL_URL=jdbc:mysql://mysql:3306/chat_app
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - REDIS_HOST=redis-server
      - REDIS_PORT=6379
    depends_on:
      - mysql
      - redis-server
  frontend:
    image: huyhoang25/chatapp_frontend:v3
    container_name: nextjs_app
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend   
volumes:
  mysql-data: